name: Trigger EdgeOne Rebuild

on:
  push:
    branches:
      - master
  repository_dispatch:
    types:
      - vault_updated

jobs:
  trigger:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Trigger EdgeOne rebuild by empty commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "chore: trigger EdgeOne rebuild"
          git push https://${{ secrets.GH_TOKEN }}@github.com/Yanch-ers/my_blog.git master