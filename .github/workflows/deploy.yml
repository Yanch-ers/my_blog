name: Trigger EdgeOne Rebuild

on:
  push:
    branches:
      - master
  repository_dispatch:
    types:
      - vault_updated

jobs:
  trigger:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger EdgeOne rebuild by empty commit
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://${GH_TOKEN}@github.com/Yanch-ers/my_blog.git
          git commit --allow-empty -m "Trigger rebuild: vault updated"
          git push origin master